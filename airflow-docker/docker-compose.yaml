version: "3.8"

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  airflow-init:
    image: airflow-dbt:latest
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      PYTHONPATH: /opt/airflow/dags
    volumes:
      - C:/projects/airflow-dags:/opt/airflow/dags
      - C:/airflow-logs:/opt/airflow/logs
      - "C:/projects/Healthcare-Claims-Analytics-Platform/dbt_project:/opt/airflow/dbt"
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create \
        --username ${AIRFLOW_ADMIN_USER} \
        --password ${AIRFLOW_ADMIN_PASSWORD} \
        --firstname ${AIRFLOW_ADMIN_FIRSTNAME} \
        --lastname ${AIRFLOW_ADMIN_LASTNAME} \
        --role Admin \
        --email ${AIRFLOW_ADMIN_EMAIL}
      "

  airflow-webserver:
    build: .
    image: airflow-dbt:latest
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      PYTHONPATH: /opt/airflow/dags
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
    volumes:
      - C:/projects/airflow-dags:/opt/airflow/dags
      - C:/airflow-logs:/opt/airflow/logs
      - "C:/projects/Healthcare-Claims-Analytics-Platform/dbt_project:/opt/airflow/dbt"
    ports:
      - "8081:8080"
    command: webserver

  airflow-scheduler:
    image: airflow-dbt:latest
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW_DB_CONN}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      PYTHONPATH: /opt/airflow/dags
    volumes:
      - C:/projects/airflow-dags:/opt/airflow/dags
      - C:/airflow-logs:/opt/airflow/logs
      - "C:/projects/Healthcare-Claims-Analytics-Platform/dbt_project:/opt/airflow/dbt"
    command: scheduler

volumes:
  postgres-db-volume: